// ── Anthropic API ─────────────────────────────────────────────────────────────
async function callClaude(system, userMsg, onChunk, imageB64=null) {
  const key = getKey();
  if (!key) throw new Error("NO_KEY");
  const content = imageB64
    ? [{type:"image",source:{type:"base64",media_type:"image/jpeg",data:imageB64}},{type:"text",text:userMsg}]
    : userMsg;
  const res = await fetch("https://api.anthropic.com/v1/messages", {
    method:"POST",
    headers:{
      "Content-Type":"application/json",
      "x-api-key": key,
      "anthropic-version":"2023-06-01",
      "anthropic-dangerous-direct-browser-access":"true",
    },
    body: JSON.stringify({
      model:"claude-sonnet-4-20250514", max_tokens:2000,
      system, messages:[{role:"user",content}], stream:true,
    }),
  });
  if (res.status===401) throw new Error("INVALID_KEY");
  if (!res.ok) throw new Error("API_ERROR");
  const reader = res.body.getReader();
  const dec = new TextDecoder();
  let full = "";
  while (true) {
    const {done, value} = await reader.read();
    if (done) break;
    for (const line of dec.decode(value).split("\n").filter(l=>l.startsWith("data:"))) {
      try {
        const j = JSON.parse(line.slice(5));
        if (j.type==="content_block_delta" && j.delta?.text) { full+=j.delta.text; onChunk(full); }
      } catch {}
    }
  }
  return full;
}

// ── PDF Reader ────────────────────────────────────────────────────────────────
async function extractPDFText(file) {
  const buffer = await file.arrayBuffer();
  const pdf = await pdfjsLib.getDocument({data: buffer}).promise;
  let fullText = "";
  const chapters = [];
  for (let i=1; i<=pdf.numPages; i++) {
    const page = await pdf.getPage(i);
    const content = await page.getTextContent();
    const pageText = content.items.map(item=>item.str).join(" ").trim();
    if (pageText) {
      fullText += pageText + "\n\n";
      if (i===1 || i%20===0) chapters.push(`الصفحة ${i}`);
    }
  }
  return { text: fullText.trim(), pages: pdf.numPages, chapters };
}

// ── URL Proxy (via allorigins) ────────────────────────────────────────────────
async function fetchURL(url) {
  const proxy = `https://api.allorigins.win/get?url=${encodeURIComponent(url)}`;
  const res = await fetch(proxy);
  if (!res.ok) throw new Error("فشل في جلب الرابط");
  const data = await res.json();
  // strip HTML tags
  const div = document.createElement('div');
  div.innerHTML = data.contents;
  const text = div.innerText || div.textContent || "";
  return text.replace(/\s+/g,' ').trim().slice(0,50000);
}

class TTS {
  constructor() {
    this.s = window.speechSynthesis;
    this.vs = [];
    this.cur = null;
    if (this.s) { this.s.onvoiceschanged = ()=>{ this.vs=this.s.getVoices(); }; this.vs=this.s.getVoices(); }
  }
  getVoice(cfg) { return this.vs.find(v=>v.lang===cfg.lang)||this.vs.find(v=>v.lang.startsWith("ar"))||null; }
  speak(text, cfg, rate=1, onWord=null, onEnd=null) {
    this.stop();
    if (!this.s) return false;
    const u = new SpeechSynthesisUtterance(text);
    const v = this.getVoice(cfg);
    if (v) u.voice=v;
    u.lang=cfg.lang; u.pitch=cfg.pitch; u.rate=cfg.rate*rate; u.volume=1;
    if (onWord) u.onboundary=e=>onWord(e.charIndex);
    if (onEnd) u.onend=onEnd;
    u.onerror=e=>{ if(e.error!=="interrupted") console.warn(e.error); };
    this.cur=u; this.s.speak(u); return true;
  }
  pause()  { this.s?.pause(); }
  resume() { this.s?.resume(); }
  stop()   { this.s?.cancel(); this.cur=null; }
  get speaking() { return this.s?.speaking||false; }
  get paused()   { return this.s?.paused||false; }
}

// ── Page splitter (splits long text into pages of ~500 words) ─────────────────
function splitPages(text, wordsPerPage=300) {
  const words = text.split(/\s+/).filter(Boolean);
  const pages = [];
  for (let i=0; i<words.length; i+=wordsPerPage) {
    pages.push(words.slice(i, i+wordsPerPage).join(' '));
  }
  return pages.length ? pages : [text];
}

// ── App ───────────────────────────────────────────────────────────────────────
function App() {
  const [view,      setView]      = useState("library");

    const saved = LS.get('qaree_books', null);

  const [hiIdx,     setHiIdx]     = useState(-1);
  const [ocrImg,    setOcrImg]    = useState(null);
  const [ocrUrl,    setOcrUrl]    = useState(null);
  const [ocrRes,    setOcrRes]    = useState("");
  const [ocrLoad,   setOcrLoad]   = useState(false);

  const [keyIn,     setKeyIn]     = useState(LS.get('qaree_api_key',''));
  const [hasKey,    setHasKey]    = useState(!!LS.get('qaree_api_key',''));
  const [toast,     setToast]     = useState("");
  const [loading,   setLoading]   = useState(false);
  const [loadMsg,   setLoadMsg]   = useState("");
  const [addErr,    setAddErr]    = useState("");
  const [fileInput, setFileInput] = useState(null);
  const [resumeDlg, setResumeDlg] = useState(null); // {book, saved} — نافذة الاستئناف

  const aiRef  = useRef(null);
  const ocrRef = useRef(null);

  const pdfRef = useRef(null);

  // Save books to localStorage whenever they change
  useEffect(()=>{ LS.set('qaree_books', books); }, [books]);

  const showT = (msg) => { setToast(msg); setTimeout(()=>setToast(""),2800); };

  useEffect(()=>{ if(aiRef.current) aiRef.current.scrollTop=aiRef.current.scrollHeight; },[msgs]);
  useEffect(()=>{ tts.stop(); setTtsOn(false); setHiIdx(-1); setPageIdx(0); },[book]);

  // Current page text
  const pages = useMemo(()=>{
    if (!book) return [""];

  }, [book]);

  const currentPageText = pages[pageIdx] || "";

  const filtered = books.filter(b=>
    (filter==="الكل"||b.type===filter) &&

  );

  const sresults = sq.length>1 && book
    ? [{loc:"النص الكامل",text:book.excerpt||""}].flatMap(({loc,text})=>{
        const results = [];

        while(true) {
          const i = text.indexOf(sq, idx);
          if (i<0) break;
          const s=Math.max(0,i-40), e=Math.min(text.length,i+sq.length+40);
          results.push({loc:`${loc} — موضع ${results.length+1}`, snippet:text.slice(s,e)});
          idx = i+1;

        }

      })
    : [];

  const fmtT=(p)=>{ const t=Math.round((p/100)*42*60); return `${Math.floor(t/60)}:${(t%60).toString().padStart(2,"0")}`; };

  // ── Read book ───────────────────────────────────────────────────────────────
  const openBook = (b) => {

  // ── Claude AI ───────────────────────────────────────────────────────────────
  const runAI = useCallback(async(prompt)=>{

      const em=e.message==="NO_KEY"?"أدخل مفتاح API أولاً":e.message==="INVALID_KEY"?"مفتاح API غير صحيح":"خطأ في الاتصال";
      setMsgs(m=>{const u=[...m];u[u.length-1]={r:"bot",t:em};return u;});
      if(e.message==="NO_KEY"||e.message==="INVALID_KEY") setShowKey(true);
    }
    setAiLoad(false);
  },[book,ch,hasKey,currentPageText]);

  const qAI=(prompt)=>{ setAiTab("chat"); runAI(prompt); };

  // ── OCR ─────────────────────────────────────────────────────────────────────
  const loadOCRFile=(file)=>{
    if(!file||!file.type.startsWith("image/")) return;
    const r=new FileReader();
    r.onload=(e)=>{ setOcrUrl(e.target.result); setOcrImg(e.target.result.split(",")[1]); setOcrRes(""); };
    r.readAsDataURL(file);
  };

  const runOCR=async()=>{
    if(!ocrImg) return;
    if(!hasKey){setShowKey(true);return;}
    setOcrLoad(true); setOcrRes("");
    try {
      const res=await fetch("https://api.anthropic.com/v1/messages",{
        method:"POST",
        headers:{"Content-Type":"application/json","x-api-key":getKey(),"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},
        body:JSON.stringify({
          model:"claude-sonnet-4-20250514",max_tokens:2000,
          system:"أنت نظام OCR متخصص بالعربية. استخرج النص من الصورة بدقة تامة. أعطِ النص فقط بلا تعليقات.",
          messages:[{role:"user",content:[
            {type:"image",source:{type:"base64",media_type:"image/jpeg",data:ocrImg}},
            {type:"text",text:"استخرج النص العربي من هذه الصورة."}
          ]}],stream:true,
        }),
      });
      if(!res.ok) throw new Error("err");
      const rdr=res.body.getReader(),dec=new TextDecoder();
      let full="";
      while(true){
        const{done,value}=await rdr.read(); if(done) break;
        for(const ln of dec.decode(value).split("\n").filter(l=>l.startsWith("data:"))){
          try{ const j=JSON.parse(ln.slice(5)); if(j.type==="content_block_delta"&&j.delta?.text){full+=j.delta.text;setOcrRes(full);} }catch{}
        }
      }
      showT("✓ تم استخراج النص بنجاح");
    } catch { setOcrRes("خطأ — تأكد من مفتاح API"); }
    setOcrLoad(false);
  };

  const addOCRBook=()=>{
    if(!ocrRes) return;
    const nb={id:Date.now(),title:"كتاب مُمسوح ضوئياً",author:"—",type:"متنوع",
      progress:0,color:"#2a3a2a",icon:"📷",
      chapters:["النص الكامل"],summary:"نص مستخرج بالمسح الضوئي.",excerpt:ocrRes,pages:1};
    setBooks(b=>[...b,nb]); openBook(nb);
    showT("✓ أُضيف الكتاب إلى مكتبتك");
  };

  // ── PDF Upload (real) ────────────────────────────────────────────────────────
  const handlePDFFile = async (file) => {
    if (!file) return;
    setAddErr("");
    const isPDF = file.type==="application/pdf" || file.name.endsWith(".pdf");
    const isTXT = file.type==="text/plain" || file.name.endsWith(".txt");

    setLoading(true);
    setLoadMsg("جارٍ قراءة الملف...");

    try {
      let text="", pages=1, chapters=[];

      if (isPDF && window.pdfjsLib) {
        setLoadMsg("جارٍ استخراج النص من PDF...");
        const result = await extractPDFText(file);
        text = result.text;
        pages = result.pages;
        chapters = result.chapters.length ? result.chapters : ["الفصل الأول"];
      } else if (isTXT) {
        text = await file.text();
        chapters = ["النص الكامل"];
        pages = Math.ceil(text.split(/\s+/).length / 300);
      } else {
        // Try reading as text anyway
        text = await file.text();
        chapters = ["النص الكامل"];
      }

      if (!text.trim()) { setAddErr("لم يتم استخراج نص من الملف"); setLoading(false); return; }

      const nb = {
        id: Date.now(),
        title: addTitle || file.name.replace(/\.[^/.]+$/,""),
        author:"—", type:"متنوع", progress:0,
        color:"#2a2a4a", icon:"📄",
        chapters, summary:`كتاب مرفوع — ${pages} صفحة`,
        excerpt: text, pages,
      };
      setBooks(b=>[...b,nb]);
      setShowAdd(false); setAddTitle("");
      openBook(nb);
      showT("✓ تم رفع الكتاب بنجاح");
    } catch(e) {
      setAddErr("حدث خطأ أثناء قراءة الملف: "+e.message);
    }
    setLoading(false);
  };

  // ── URL Fetch ────────────────────────────────────────────────────────────────
  const handleURL = async () => {
    if (!urlIn.trim()) return;
    setAddErr("");
    setLoading(true);
    setLoadMsg("جارٍ جلب المحتوى من الرابط...");
    try {
      const text = await fetchURL(urlIn.trim());
      if (!text || text.length < 100) { setAddErr("لم يتم استخراج محتوى كافٍ من الرابط"); setLoading(false); return; }
      const nb = {
        id: Date.now(),
        title: addTitle || new URL(urlIn).hostname,
        author:"من الويب", type:"متنوع", progress:0,
        color:"#1a2a4a", icon:"🌐",
        chapters:["المحتوى الكامل"],
        summary:`محتوى مجلوب من: ${urlIn.slice(0,60)}`,
        excerpt: text, pages: Math.ceil(text.split(/\s+/).length/300),
      };
      setBooks(b=>[...b,nb]);
      setShowAdd(false); setUrlIn(""); setAddTitle("");
      openBook(nb);
      showT("✓ تم جلب المحتوى بنجاح");
    } catch(e) {
      setAddErr("فشل في جلب الرابط. تأكد من صحة الرابط أو جرّب نسخ النص يدوياً.");
    }
    setLoading(false);
  };

  // ── TTS ─────────────────────────────────────────────────────────────────────
  const doTTS=()=>{
    if(ttsOn){ if(tts.paused) tts.resume(); else tts.pause(); return; }
    const text=currentPageText; if(!text) return;
    const words=text.split(" ");
    const map=[]; let c=0;
    words.forEach(w=>{ map.push(c); c+=w.length+1; });
    setTtsOn(true); setHiIdx(0);
    const ok=tts.speak(text, voice, speed,
      (ci)=>{ const wi=map.reduce((p,v,i)=>v<=ci?i:p,0); setHiIdx(wi); },
      ()=>{
        setTtsOn(false); setHiIdx(-1);
        // Auto advance to next page
        if (pageIdx < totalPages-1) {
          const np=pageIdx+1;
          const newProg=Math.min(99,Math.round(((ch*totalPages+np)/((book?.chapters?.length||1)*totalPages))*100));
          setTimeout(()=>{ setPageIdx(np); if(book) saveProgress(book.id,ch,np,newProg); }, 600);
          showT("▶ الصفحة التالية");
        } else if (ch < (book?.chapters?.length||1)-1) {
          const nc=ch+1;
          const newProg=Math.min(99,Math.round((nc/(book?.chapters?.length||1))*100));
          setTimeout(()=>{ setCh(nc); setPageIdx(0); if(book) saveProgress(book.id,nc,0,newProg); }, 600);
          showT("▶ الفصل التالي");
        } else {
          // أكمل الكتاب
          if(book) saveProgress(book.id, ch, pageIdx, 100);
          showT("🎉 أكملت هذا الكتاب!");
        }
      }
    );
    if(!ok) showT("المتصفح لا يدعم الصوت العربي — جرّب Chrome");
  };
  const stopTTS=()=>{ tts.stop(); setTtsOn(false); setHiIdx(-1); };

  const testVoice=(cfg)=>{
    if(testV===cfg.id){tts.stop();setTestV(null);return;}

    tts.speak("مرحباً، هذا اختبار للصوت العربي.",cfg,1,null,()=>setTestV(null));

  // ── Page navigation ──────────────────────────────────────────────────────────
  const goNextPage=()=>{

      const nc=ch+1;

      const newProg = Math.min(99, Math.round((nc/(book?.chapters?.length||1))*100));

  };

              <div className="bgrid">
                {filtered.map(b=><Bcard key={b.id} b={b} sel={book?.id===b.id} onClick={()=>openBook(b)} onDel={(e)=>deleteBook(b.id,e)}/>)}
              </div>

                    <div style={{fontSize:12,color:"var(--t3)"}}>

              </div>

                <div className="st" style={{marginBottom:10}}>مستوى التقدم</div>
                {books.slice(0,5).map((b,i)=>(
                  <div key={b.id} style={{marginBottom:10}}>
                    <div style={{display:"flex",justifyContent:"space-between",fontSize:12,color:"var(--t2)",marginBottom:4}}>
                      <span>{b.icon} {b.title}</span><span style={{color:"var(--a3)"}}>{b.progress}%</span>
                    </div>
                    <div style={{height:4,background:"var(--bd2)",borderRadius:2}}>

              <div style={{display:"flex",flexDirection:"column",gap:2}}>
                {(book.chapters||[]).map((c,i)=>(
                  <div key={i} className={`sbi${ch===i?" on":""}`} onClick={()=>{setCh(i);setPageIdx(0);stopTTS();}}>
                    <span style={{fontSize:11,color:"var(--t3)",minWidth:18}}>{i+1}</span>{c}
                    {ch===i&&<span style={{marginRight:"auto",fontSize:10,color:"var(--a3)"}}>▶</span>}
                  </div>
                ))}
              </div>
            )}

            {aiTab==="voices"&&<>
              <div className="aim">اختر الصوت العربي وجرّبه قبل الاستماع.</div>
              {VOICES.map(cfg=>(
                <div key={cfg.id} className={`vc${voice.id===cfg.id?" on":""}`} onClick={()=>setVoice(cfg)}>
                  <div className="vavatar" style={{background:cfg.gender==="f"?"rgba(124,58,237,.2)":"rgba(46,168,110,.2)"}}>{cfg.gender==="f"?"👩":"👨"}</div>
                  <div><div className="vname">{cfg.label}</div><div className="vsub">{cfg.dialect} · {cfg.lang}</div></div>
                  <button className={`vtbtn${testV===cfg.id?" on":""}`} onClick={e=>{e.stopPropagation();testVoice(cfg);}}>
                    {testV===cfg.id?"■ إيقاف":"▶ تجربة"}
                  </button>
                </div>
              ))}
            </>}

            {aiTab==="ocr"&&<>
              <div className="aim">📷 <strong>المسح الضوئي</strong><br/>ارفع صورة كتاب ورقي وسيُستخرج النص تلقائياً.</div>
              {ocrUrl&&<img src={ocrUrl} className="oimg" alt="preview"/>}
              <div className="odrop" ref={dropRef}
                onClick={()=>ocrRef.current?.click()}
                onDragOver={e=>{e.preventDefault();}}
                onDrop={e=>{e.preventDefault();loadOCRFile(e.dataTransfer.files[0]);}}>
                <input ref={ocrRef} type="file" accept="image/*" style={{display:"none"}} onChange={e=>loadOCRFile(e.target.files[0])}/>
                <div style={{fontSize:22,marginBottom:5,color:"var(--t3)"}}><Ic n="camera" s={22}/></div>
                <div style={{fontSize:13,color:"var(--t2)",fontWeight:500}}>{ocrImg?"استبدل الصورة":"ارفع صورة الكتاب"}</div>
                <div style={{fontSize:11,color:"var(--t3)",marginTop:3}}>JPG · PNG — اسحب وأفلت</div>
              </div>
              {ocrImg&&<button className="msub" disabled={ocrLoad} onClick={runOCR} style={{display:"flex",alignItems:"center",justifyContent:"center",gap:8}}>
                {ocrLoad?<><span className="sp"/>&nbsp;جارٍ الاستخراج...</>:"🔍 استخرج النص"}
              </button>}
              {ocrRes&&<>
                <div className="ores">{ocrRes}</div>
                <button className="msub" onClick={addOCRBook} style={{background:"var(--purple)"}}>＋ أضف إلى المكتبة</button>
              </>}
            </>}

            {aiTab==="dict"&&<>
              <input className="mi" placeholder="ابحث عن كلمة..." value={dsq} onChange={e=>setDsq(e.target.value)} style={{marginBottom:4}}/>
              {Object.entries(DICT).filter(([w])=>dsq===""||w.includes(dsq)).map(([word,def])=>(
                <div key={word} className="de"><div><div className="dw">{word}</div><div className="dd">{def}</div></div></div>
              ))}
            </>}

            {aiTab==="chat"&&<>
              {msgs.length===0&&<div className="aim">
                مرحباً! اسألني عن <strong>{book?.title||"الكتاب الذي تقرأه"}</strong>.
                {!hasKey&&<><br/><span style={{color:"var(--gold)",fontSize:11}}>⚠ أدخل API Key أولاً</span></>}
              </div>}
              {msgs.map((m,i)=>(
                <div key={i} className={`aim${m.r==="bot"?" bot":""}`}>
                  {m.r==="user"&&<span style={{color:"var(--t3)",fontSize:11}}>أنت: </span>}
                  {m.t||<span className="sp"/>}
                </div>
              ))}
            </>}
          </div>

          <div className="aiqrow">
            <button className="aiq" onClick={()=>qAI(`لخّص هذا النص في 3 نقاط: "${currentPageText.slice(0,200)}"`)}>📝 ملخص الصفحة</button>
            <button className="aiq" onClick={()=>qAI(`ما الأفكار الرئيسية في "${book?.title}"؟`)}>💡 أفكار</button>
            <button className="aiq" onClick={()=>qAI(`اقترح كتباً مشابهة لـ "${book?.title}"`)}>📚 مشابهة</button>
            <button className="aiq" onClick={()=>qAI(`اشرح المصطلحات الصعبة في هذا النص: "${currentPageText.slice(0,200)}"`)}>🔤 مصطلحات</button>
          </div>

          {aiTab==="chat"&&(
            <div className="aiinrow">
              <input placeholder="اسأل عن الكتاب..." value={aiIn} onChange={e=>setAiIn(e.target.value)}
                disabled={aiLoad} onKeyDown={e=>{if(e.key==="Enter"&&aiIn.trim()){runAI(aiIn);setAiIn("");}}}/>
              <button className="aisend" disabled={!aiIn.trim()||aiLoad} onClick={()=>{runAI(aiIn);setAiIn("");}}>←</button>
            </div>
          )}
        </aside>

        {/* PLAYER BAR */}
        <footer className="player">
          <div className="pbk">
            <div className="pcover" style={{background:(book?.color||"#1a6b4a")+"33"}}>{book?.icon||"📗"}</div>
            <div>
              <div className="ptitle">{book?.title||"اختر كتاباً"}</div>
              <div className="pch">{book?`ص ${pageIdx+1}/${totalPages}`:"—"}</div>
            </div>
          </div>
          <div className="pctrls">
            <button className="ctrl" onClick={goPrevPage}><Ic n="prev" s={13}/></button>
            <button className="ctrl" onClick={()=>setProg(p=>Math.max(0,p-3))}><Ic n="rwd" s={14}/></button>
            <button className={`pp${ttsOn?" spk":""}`} onClick={()=>{ if(ttsOn) stopTTS(); else { setView("reader"); setTimeout(doTTS,100); } }}>
              <Ic n={ttsOn?"pause":"play"} s={15}/>
            </button>
            <button className="ctrl" onClick={()=>setProg(p=>Math.min(100,p+3))}><Ic n="fwd" s={14}/></button>
            <button className="ctrl" onClick={goNextPage}><Ic n="next" s={13}/></button>
          </div>
          <div className="pright">
            <span className="tlbl">{fmtT(prog)}</span>
            <div className="ptrack" onClick={e=>{const r=e.currentTarget.getBoundingClientRect();setProg(Math.max(0,Math.min(100,((e.clientX-r.left)/r.width)*100)));}}>
              <div className="pfill" style={{width:`${book?.progress||0}%`}}/>
            </div>
            <span className="tlbl">{book?`${book.pages||0} ص`:""}</span>
          </div>
          <div className="spdg">
            <button className="spdb" onClick={()=>{setSpeed(s=>Math.max(0.5,Math.round((s-.25)*4)/4));if(ttsOn)stopTTS();}}>−</button>
            <span className="spdv">{speed.toFixed(2).replace(/\.?0+$/,"")}×</span>
            <button className="spdb" onClick={()=>{setSpeed(s=>Math.min(4,Math.round((s+.25)*4)/4));if(ttsOn)stopTTS();}}>+</button>
          </div>
          <div className="vind" onClick={()=>{setAiTab("voices");setView("reader");}}>
            <Ic n="mic" s={12}/>
            <span style={{fontSize:11,color:"var(--t2)"}}>{voice.label}</span>
          </div>
        </footer>

        {/* ADD BOOK MODAL */}
        {showAdd&&(
          <div className="mbg" onClick={e=>e.target===e.currentTarget&&setShowAdd(false)}>
            <div className="modal fi">
              <div className="mhead">
                <span className="mtitle">إضافة كتاب جديد</span>
                <button className="mcls" onClick={()=>setShowAdd(false)}><Ic n="x" s={15}/></button>
              </div>
              <div className="srctabs">
                {[{id:"pdf",l:"PDF / TXT",i:"upload"},{id:"url",l:"رابط ويب",i:"link"},
                  {id:"text",l:"لصق نص",i:"text"},{id:"ocr",l:"مسح ورقي",i:"camera"}]
                  .map(t=><button key={t.id} className={`srctab${addTab===t.id?" on":""}`} onClick={()=>{setAddTab(t.id);setAddErr("");}}>
                    <Ic n={t.i} s={15}/>{t.l}
                  </button>)}
              </div>
              <div className="mbody">
                <input className="mi" placeholder="اسم الكتاب (اختياري)" value={addTitle} onChange={e=>setAddTitle(e.target.value)}/>

                {addTab==="pdf"&&(
                  <div className="dzone" ref={pdfRef}
                    onClick={()=>{ const inp=document.createElement('input'); inp.type='file'; inp.accept='.pdf,.txt,.epub'; inp.onchange=e=>handlePDFFile(e.target.files[0]); inp.click(); }}
                    onDragOver={e=>{e.preventDefault();pdfRef.current?.classList.add("drag");}}
                    onDragLeave={()=>pdfRef.current?.classList.remove("drag")}
                    onDrop={e=>{e.preventDefault();pdfRef.current?.classList.remove("drag");handlePDFFile(e.dataTransfer.files[0]);}}>
                    <div style={{fontSize:28,marginBottom:8}}><Ic n="upload" s={28}/></div>
                    <div style={{fontSize:13,color:"var(--t2)",fontWeight:500}}>اسحب الملف هنا أو انقر للاختيار</div>
                    <div style={{fontSize:11,color:"var(--t3)",marginTop:4}}>PDF · TXT — يُستخرج النص تلقائياً</div>
                  </div>
                )}

                {addTab==="url"&&<>
                  <input className="mi" placeholder="https://..." value={urlIn} onChange={e=>setUrlIn(e.target.value)} onKeyDown={e=>e.key==="Enter"&&handleURL()}/>
                  <div className="minfo">
                    يجلب النص من الرابط مباشرة. يعمل مع معظم المواقع العربية.<br/>
                    مثال: مقالات ويكيبيديا، الشاملة، المكتبة الوقفية
                  </div>
                  <button className="msub" disabled={!urlIn.trim()} onClick={handleURL}>
                    جلب المحتوى من الرابط
                  </button>
                </>}

                {addTab==="text"&&<>
                  <textarea className="mi" rows={7} placeholder="الصق النص العربي هنا مباشرة..." value={txtIn} onChange={e=>setTxtIn(e.target.value)}/>
                  <button className="msub" disabled={!txtIn.trim()} onClick={()=>{
                    const nb={id:Date.now(),title:addTitle||"نص مُلصق",author:"—",type:"متنوع",progress:0,color:"#2a2a3a",icon:"📝",
                      chapters:["النص الكامل"],summary:"نص مُلصق يدوياً.",excerpt:txtIn,pages:Math.ceil(txtIn.split(/\s+/).length/300)};
                    setBooks(b=>[...b,nb]);setShowAdd(false);setTxtIn("");setAddTitle("");
                    openBook(nb); showT("✓ تم إضافة النص");
                  }}>إضافة النص إلى المكتبة</button>
                </>}

                {addTab==="ocr"&&(
                  <div style={{textAlign:"center",padding:"8px 0"}}>
                    <div style={{fontSize:32,marginBottom:10}}>📷</div>
                    <div style={{fontSize:13,color:"var(--t2)",marginBottom:14}}>ارفع صورة كتاب ورقي — Claude يستخرج النص تلقائياً</div>
                    <button className="msub" style={{background:"var(--purple)"}} onClick={()=>{setShowAdd(false);setAiTab("ocr");setView("reader");}}>
                      انتقل إلى المسح الضوئي
                    </button>
                  </div>
                )}

                {addErr&&<div className="merr">⚠ {addErr}</div>}
              </div>
            </div>
          </div>
        )}

        {/* RESUME DIALOG — نافذة استئناف القراءة */}
        {resumeDlg&&(
          <div className="mbg" onClick={e=>e.target===e.currentTarget&&setResumeDlg(null)}>
            <div className="rdlg fi">
              <div className="rdlg-cover" style={{background:(resumeDlg.book.color||"#1a6b4a")+"66"}}>
                {resumeDlg.book.icon}
              </div>
              <div className="rdlg-body">
                <div className="rdlg-title">{resumeDlg.book.title}</div>
                <div className="rdlg-sub">
                  آخر موضع: الفصل {(resumeDlg.saved.ch||0)+1} · صفحة {(resumeDlg.saved.page||0)+1}<br/>
                  التقدم: {resumeDlg.saved.prog||0}% من الكتاب
                </div>
                <div className="rdlg-prog">
                  <div className="rdlg-prog-fill" style={{width:`${resumeDlg.saved.prog||0}%`}}/>
                </div>
                <div className="rdlg-btns">
                  <button className="rdlg-btn-main" onClick={()=>startBook(resumeDlg.book, resumeDlg.saved.ch||0, resumeDlg.saved.page||0, resumeDlg.saved.prog||0)}>
                    ▶ استمر من حيث توقفت
                  </button>
                  <button className="rdlg-btn-sec" onClick={()=>{ LS.del(`qaree_prog_${resumeDlg.book.id}`); startBook(resumeDlg.book,0,0,0); }}>
                    ↺ ابدأ من البداية
                  </button>
                </div>
              </div>
            </div>
          </div>
        )}


        {showKey&&(
          <div className="mbg" onClick={e=>e.target===e.currentTarget&&setShowKey(false)}>
            <div className="kmodal fi">
              <div className="mhead">
                <span className="mtitle" style={{display:"flex",alignItems:"center",gap:8}}><Ic n="key" s={15}/> مفتاح Anthropic API</span>
                <button className="mcls" onClick={()=>setShowKey(false)}><Ic n="x" s={15}/></button>
              </div>
              <div className="mbody">
                <div className="kinfo">
                  يُستخدم للمساعد الذكي وميزة OCR.<br/>
                  <strong style={{color:"var(--a3)"}}>✓ يُحفظ تلقائياً</strong> في المتصفح — لن تحتاج إدخاله مجدداً.<br/>
                  احصل على مفتاحك من: <span style={{color:"var(--a3)"}}>console.anthropic.com</span>
                </div>
                <div className="krow">
                  <input className="mi" type="password" placeholder="sk-ant-api03-..."
                    value={keyIn} onChange={e=>setKeyIn(e.target.value)}
                    onKeyDown={e=>e.key==="Enter"&&saveKey()}
                    style={{fontFamily:"monospace",fontSize:12}}/>
                  <button className="ksave" onClick={saveKey}>حفظ</button>
                </div>
                {hasKey&&(
                  <div style={{padding:"8px 11px",background:"rgba(46,168,110,.09)",border:"1px solid var(--a)",borderRadius:8,fontSize:12,color:"var(--a3)",display:"flex",alignItems:"center",gap:6}}>
                    <Ic n="check" s={13}/> مفتاح API نشط ومحفوظ
                    <button onClick={()=>{clearApiKey();setHasKey(false);setKeyIn("");setShowKey(false);showT("تم حذف المفتاح");}}
                      style={{marginRight:"auto",fontSize:11,background:"none",border:"none",color:"var(--red)",cursor:"pointer"}}>حذف</button>
                  </div>
                )}
              </div>
            </div>
          </div>
        )}

      </div>
    </>
  );
}

function Bcard({b, sel, onClick, onDel}) {
  return (
    <div className={`bc${sel?" sel":""}`} onClick={onClick}>
      <div className="bcover" style={{background:(b.color||"#1a6b4a")+"44"}}>
        {b.icon}
        <div className="bpct">{b.progress}%</div>
        <div className="bbar"><div className="bfill" style={{width:`${b.progress}%`}}/></div>
        <button className="bdel" onClick={onDel}><Ic n="trash" s={11}/></button>
      </div>
      <div className="bbody">
        <div className="btitle">{b.title}</div>
        <div className="bauthor">{b.author}</div>
        <div className="btag">{b.type}</div>
      </div>
    </div>
  );
}

// Render
const container = document.getElementById('root');
const root = ReactDOM.createRoot(container);
root.render(<App/>);

// Hide loading screen
document.getElementById('loading').style.display='none';
  </script>
</body>
</html>
