let _apiKey = "";

// ── Anthropic API (streaming) ─────────────────────────────────────────────────
async function callClaude(system, userMsg, onChunk, imageB64 = null) {
  const key = getKey();
  if (!key) throw new Error("NO_KEY");
  const content = imageB64
    ? [{ type:"image", source:{type:"base64", media_type:"image/jpeg", data:imageB64} },
       { type:"text", text:userMsg }]
    : userMsg;
  const res = await fetch("https://api.anthropic.com/v1/messages", {
    method:"POST",
    headers:{
      "Content-Type":"application/json",
      "x-api-key": key,
      "anthropic-version":"2023-06-01",
      "anthropic-dangerous-direct-browser-access":"true",
    },
    body: JSON.stringify({
      model:"claude-sonnet-4-20250514", max_tokens:1500,
      system, messages:[{role:"user", content}], stream:true,
    }),
  });
  if (res.status===401) throw new Error("INVALID_KEY");
  if (!res.ok) throw new Error("API_ERROR");
  const reader = res.body.getReader();
  const dec = new TextDecoder();
  let full = "";
  while (true) {
    const {done, value} = await reader.read();
    if (done) break;
    for (const line of dec.decode(value).split("\n").filter(l=>l.startsWith("data:"))) {
      try {
        const j = JSON.parse(line.slice(5));
        if (j.type==="content_block_delta" && j.delta?.text) { full+=j.delta.text; onChunk(full); }
      } catch {}
    }
  }
  return full;
}

class TTS {
  constructor() {
    this.s = window.speechSynthesis;
    this.vs = [];
    this.cur = null;
    if (this.s) { this.s.onvoiceschanged = () => { this.vs = this.s.getVoices(); }; this.vs = this.s.getVoices(); }
  }
  getVoice(cfg) {
    return this.vs.find(v=>v.lang===cfg.lang) || this.vs.find(v=>v.lang.startsWith("ar")) || null;
  }
  speak(text, cfg, rate=1, onWord=null, onEnd=null) {
    this.stop();
    if (!this.s) return false;
    const u = new SpeechSynthesisUtterance(text);
    const v = this.getVoice(cfg);
    if (v) u.voice = v;
    u.lang=cfg.lang; u.pitch=cfg.pitch; u.rate=cfg.rate*rate; u.volume=1;
    if (onWord) u.onboundary = e => onWord(e.charIndex);
    if (onEnd)  u.onend = onEnd;
    u.onerror = e => { if (e.error!=="interrupted") console.warn(e.error); };
    this.cur = u; this.s.speak(u); return true;
  }
  pause()  { this.s?.pause(); }
  resume() { this.s?.resume(); }
  stop()   { this.s?.cancel(); this.cur=null; }
  get speaking() { return this.s?.speaking||false; }
  get paused()   { return this.s?.paused||false; }
}

// ── App ───────────────────────────────────────────────────────────────────────
export default function App() {
  const [view,       setView]       = useState("library");
  const [books,      setBooks]      = useState(BOOKS);
  const [book,       setBook]       = useState(BOOKS[0]);
  const [ch,         setCh]         = useState(0);
  const [filter,     setFilter]     = useState("الكل");
  const [speed,      setSpeed]      = useState(1.5);
  const [prog,       setProg]       = useState(34);
  const [showAdd,    setShowAdd]    = useState(false);
  const [addTab,     setAddTab]     = useState("pdf");
  const [urlIn,      setUrlIn]      = useState("");
  const [txtIn,      setTxtIn]      = useState("");
  const [aiTab,      setAiTab]      = useState("summary");
  const [msgs,       setMsgs]       = useState([]);
  const [aiIn,       setAiIn]       = useState("");
  const [aiLoad,     setAiLoad]     = useState(false);
  const [sq,         setSq]         = useState("");
  const [gsq,        setGsq]        = useState("");
  const [hovW,       setHovW]       = useState(null);
  const [dsq,        setDsq]        = useState("");
  const [bkm,        setBkm]        = useState(false);
  const [voice,      setVoice]      = useState(VOICES[0]);
  const [testV,      setTestV]      = useState(null);
  const [ttsOn,      setTtsOn]      = useState(false);
  const [hiIdx,      setHiIdx]      = useState(-1);
  const [ocrImg,     setOcrImg]     = useState(null);
  const [ocrUrl,     setOcrUrl]     = useState(null);
  const [ocrRes,     setOcrRes]     = useState("");
  const [ocrLoad,    setOcrLoad]    = useState(false);
  const [showKey,    setShowKey]    = useState(false);
  const [keyIn,      setKeyIn]      = useState("");
  const [hasKey,     setHasKey]     = useState(false);
  const [toast,      setToast]      = useState("");

  const aiRef  = useRef(null);
  const ocrRef = useRef(null);
  const dropRef= useRef(null);

  const showT = (msg) => { setToast(msg); setTimeout(()=>setToast(""),2600); };

  useEffect(()=>{ if(aiRef.current) aiRef.current.scrollTop=aiRef.current.scrollHeight; },[msgs]);
  useEffect(()=>{ tts.stop(); setTtsOn(false); setHiIdx(-1); },[book]);

  const filtered = books.filter(b=>
    (filter==="الكل"||b.type===filter) &&
    (gsq===""||b.title.includes(gsq)||b.author.includes(gsq))
  );

  const sresults = sq.length>1 && book
    ? [{loc:"مقتطف",text:book.excerpt},{loc:"ملخص",text:book.summary}].flatMap(({loc,text})=>{
        const i=text.indexOf(sq); if(i<0) return [];
        const s=Math.max(0,i-35),e=Math.min(text.length,i+sq.length+35);
        return [{loc,snippet:text.slice(s,e)}];
      })
    : [];

  const fmtT=(p)=>{ const t=Math.round((p/100)*42*60); return `${Math.floor(t/60)}:${(t%60).toString().padStart(2,"0")}`; };

  // ── Claude ──────────────────────────────────────────────────────────────────
  const runAI = useCallback(async(prompt)=>{
    if (!hasKey){setShowKey(true);return;}
    setAiLoad(true);
    setMsgs(m=>[...m,{r:"user",t:prompt},{r:"bot",t:""}]);
    const sys=`أنت مساعد قراءة ذكي للكتب العربية. الكتاب الحالي: "${book?.title}" للمؤلف ${book?.author}. الفصل: ${book?.chapters[ch]}. أجب بالعربية الفصحى بشكل مختصر ومفيد.`;
    try {
      await callClaude(sys,prompt,(text)=>{
        setMsgs(m=>{const u=[...m];u[u.length-1]={r:"bot",t:text};return u;});
      });
    } catch(e){
      const em=e.message==="NO_KEY"?"أدخل مفتاح API أولاً":e.message==="INVALID_KEY"?"مفتاح غير صحيح":"خطأ في الاتصال";
      setMsgs(m=>{const u=[...m];u[u.length-1]={r:"bot",t:em};return u;});
      if(e.message==="NO_KEY"||e.message==="INVALID_KEY") setShowKey(true);
    }
    setAiLoad(false);
  },[book,ch,hasKey]);

  const qAI=(prompt)=>{ setAiTab("chat"); runAI(prompt); };

  // ── OCR ─────────────────────────────────────────────────────────────────────
  const loadOCRFile=(file)=>{
    if(!file||!file.type.startsWith("image/")) return;
    const r=new FileReader();
    r.onload=(e)=>{ setOcrUrl(e.target.result); setOcrImg(e.target.result.split(",")[1]); setOcrRes(""); };
    r.readAsDataURL(file);
  };

  const runOCR=async()=>{
    if(!ocrImg) return;
    if(!hasKey){setShowKey(true);return;}
    setOcrLoad(true); setOcrRes("");
    try {
      const res=await fetch("https://api.anthropic.com/v1/messages",{
        method:"POST",
        headers:{"Content-Type":"application/json","x-api-key":getKey(),
          "anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},
        body:JSON.stringify({
          model:"claude-sonnet-4-20250514",max_tokens:1500,
          system:"أنت نظام OCR متخصص بالعربية. استخرج النص من الصورة بدقة تامة مع الحفاظ على الفقرات. أعطِ النص فقط بلا تعليقات.",
          messages:[{role:"user",content:[
            {type:"image",source:{type:"base64",media_type:"image/jpeg",data:ocrImg}},
            {type:"text",text:"استخرج النص العربي من هذه الصورة."}
          ]}],stream:true,
        }),
      });
      if(!res.ok) throw new Error("err");
      const rdr=res.body.getReader(),dec=new TextDecoder();
      let full="";
      while(true){
        const{done,value}=await rdr.read(); if(done) break;
        for(const ln of dec.decode(value).split("\n").filter(l=>l.startsWith("data:"))){
          try{ const j=JSON.parse(ln.slice(5));
            if(j.type==="content_block_delta"&&j.delta?.text){full+=j.delta.text;setOcrRes(full);}
          }catch{}
        }
      }
      showT("✓ تم استخراج النص بنجاح");
    } catch { setOcrRes("خطأ — تأكد من مفتاح API"); }
    setOcrLoad(false);
  };

  const addOCRBook=()=>{
    if(!ocrRes) return;
    const nb={id:books.length+1,title:"كتاب مُمسوح ضوئياً",author:"—",type:"متنوع",
      progress:0,color:"#2a3a2a",icon:"📷",
      chapters:["النص الكامل"],summary:"نص مستخرج بالمسح الضوئي.",excerpt:ocrRes.slice(0,500)};
    setBooks(b=>[...b,nb]); setBook(nb); setView("reader");
    showT("✓ أُضيف الكتاب إلى مكتبتك");
  };

  // ── TTS ─────────────────────────────────────────────────────────────────────
  const doTTS=()=>{
    if(ttsOn){ if(tts.paused) tts.resume(); else tts.pause(); return; }
    const text=book?.excerpt||""; if(!text) return;
    const words=text.split(" ");
    const map=[]; let c=0;
    words.forEach(w=>{ map.push(c); c+=w.length+1; });
    setTtsOn(true); setHiIdx(0);
    const ok=tts.speak(text,voice,speed,
      (ci)=>{ const wi=map.reduce((p,v,i)=>v<=ci?i:p,0); setHiIdx(wi); },
      ()=>{ setTtsOn(false); setHiIdx(-1); }
    );
    if(!ok) showT("المتصفح لا يدعم الصوت العربي — جرّب Chrome");
  };
  const stopTTS=()=>{ tts.stop(); setTtsOn(false); setHiIdx(-1); };

  const testVoice=(cfg)=>{
    if(testV===cfg.id){tts.stop();setTestV(null);return;}
    setTestV(cfg.id);
    tts.speak("مرحباً، هذا اختبار للصوت العربي.",cfg,1,null,()=>setTestV(null));
  };

  // ── Save key ────────────────────────────────────────────────────────────────
  const saveKey=()=>{
    if(!keyIn.trim().startsWith("sk-ant-")){showT("❌ المفتاح يجب أن يبدأ بـ sk-ant-");return;}
    setKey(keyIn.trim()); setHasKey(true); setShowKey(false); showT("✓ تم حفظ مفتاح API");
  };

  const types=["الكل",...new Set(books.map(b=>b.type))];

  return (
    <>
      <style>{CSS}</style>
      {toast && <div className="toast">{toast}</div>}

      <div className="shell">

        {/* ── NAV ── */}
        <nav className="nav">
          <div className="logo"><div className="lm">ق</div> قارئ</div>

          <div className="nsearch">
            <span className="si"><Ic n="search" s={13}/></span>
            <input placeholder="ابحث في مكتبتك..." value={gsq} onChange={e=>setGsq(e.target.value)}/>
          </div>

          <div className="ntabs">
            {["library","reader","stats"].map((v,i)=>(
              <button key={v} className={`ntab${view===v?" on":""}`} onClick={()=>setView(v)}>
                {["مكتبتي","القارئ","الإحصائيات"][i]}
              </button>
            ))}
          </div>

          <button className={`kbtn${hasKey?" on":""}`} onClick={()=>setShowKey(true)}>
            <Ic n="key" s={13}/> {hasKey?"API ✓":"أدخل API Key"}
          </button>

          <button className="abtn" onClick={()=>setShowAdd(true)}>
            <Ic n="upload" s={13}/> إضافة كتاب
          </button>
        </nav>

        {/* ── SIDEBAR ── */}
        <aside className="sb">
          <div className="sbs">التصنيفات</div>
          {[{l:"جميع الكتب",i:"📚",k:"الكل"},{l:"أقرأ الآن",i:"▷",k:"reading"},{l:"مكتملة",i:"✓",k:"done"}].map(x=>(
            <div key={x.k} className={`sbi${filter===x.k?" on":""}`} onClick={()=>setFilter(x.k)}>
              <span>{x.i}</span>{x.l}
              {x.k==="reading"&&<span className="sbadge">{books.filter(b=>b.progress>0&&b.progress<100).length}</span>}
            </div>
          ))}
          <div className="sbs">الأنواع</div>
          {[["روايات","📖"],["تطوير ذاتي","🧠"],["تاريخ","🏛"],["تراث","📜"]].map(([l,i])=>(
            <div key={l} className={`sbi${filter===l?" on":""}`} onClick={()=>setFilter(l)}>
              <span>{i}</span>{l}
            </div>
          ))}
          <div className="sbs">أدوات</div>
          <div className="sbi" onClick={()=>{setAiTab("voices");setView("reader");}}>
            <Ic n="mic" s={13}/> الأصوات العربية
          </div>
          <div className="sbi" onClick={()=>{setAiTab("ocr");setView("reader");}}>
            <Ic n="scan" s={13}/> مسح ضوئي OCR
          </div>
          <div className="sbi" onClick={()=>{setAiTab("dict");setView("reader");}}>
            <Ic n="dict" s={13}/> القاموس العربي
          </div>
        </aside>

        {/* ── MAIN ── */}
        <main className="main">

          {/* LIBRARY */}
          {view==="library"&&(
            <div className="fi">
              {books.filter(b=>b.progress>0&&b.progress<100).length>0&&<>
                <div className="sh"><span className="st">استمر في القراءة</span></div>
                <div className="bgrid" style={{marginBottom:20}}>
                  {books.filter(b=>b.progress>0&&b.progress<100).map(b=>(
                    <Bcard key={b.id} b={b} sel={book?.id===b.id} onClick={()=>{setBook(b);setView("reader");}}/>
                  ))}
                </div>
              </>}
              <div className="sh"><span className="st">كل الكتب</span></div>
              <div className="frow">{types.map(t=><button key={t} className={`fp${filter===t?" on":""}`} onClick={()=>setFilter(t)}>{t}</button>)}</div>
              <div className="bgrid">{filtered.map(b=><Bcard key={b.id} b={b} sel={book?.id===b.id} onClick={()=>{setBook(b);setView("reader");}}/>)}</div>
            </div>
          )}

          {/* READER */}
          {view==="reader"&&book&&(
            <div className="fi">
              {/* Header */}
              <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:13}}>
                <span style={{fontSize:24}}>{book.icon}</span>
                <div style={{flex:1}}>
                  <div style={{fontSize:16,fontWeight:700,fontFamily:"'Amiri',serif"}}>{book.title}</div>
                  <div style={{fontSize:12,color:"var(--t3)"}}>{book.author} · الفصل {ch+1}: {book.chapters[ch]}</div>
                </div>
                {/* TTS buttons */}
                <div style={{display:"flex",gap:6}}>
                  <button onClick={doTTS} style={{
                    display:"flex",alignItems:"center",gap:5,padding:"6px 12px",fontSize:12,
                    background:ttsOn?"rgba(124,58,237,.18)":"rgba(46,168,110,.1)",
                    border:`1px solid ${ttsOn?"var(--purple)":"var(--a)"}`,borderRadius:8,
                    cursor:"pointer",color:ttsOn?"#a78bfa":"var(--a3)",fontFamily:"'Tajawal',sans-serif",
                    transition:"all .2s"
                  }}>
                    <Ic n={ttsOn?"pause":"voice"} s={13}/>
                    {ttsOn?"إيقاف مؤقت":"استمع الآن"}
                  </button>
                  {ttsOn&&(
                    <button onClick={stopTTS} style={{
                      padding:"6px 11px",fontSize:12,background:"rgba(224,92,92,.1)",
                      border:"1px solid var(--red)",borderRadius:8,cursor:"pointer",
                      color:"var(--red)",fontFamily:"'Tajawal',sans-serif"
                    }}>■ إيقاف</button>
                  )}
                </div>
              </div>

              {/* In-book search */}
              <div style={{position:"relative",marginBottom:13}}>
                <span style={{position:"absolute",right:9,top:"50%",transform:"translateY(-50%)",color:"var(--t3)"}}><Ic n="search" s={13}/></span>
                <input className="mi" style={{paddingRight:28,paddingLeft:10}}
                  placeholder="ابحث داخل الكتاب..." value={sq} onChange={e=>setSq(e.target.value)}/>
              </div>

              {sq.length>1&&(
                <div style={{marginBottom:13}}>
                  <div className="st" style={{marginBottom:8}}>نتائج "{sq}"</div>
                  {sresults.length===0
                    ? <div style={{color:"var(--t3)",fontSize:13}}>لا توجد نتائج</div>
                    : sresults.map((r,i)=>(
                        <div key={i} className="sres">
                          <div className="sloc">📍 {r.loc}</div>
                          <div dangerouslySetInnerHTML={{__html:r.snippet.replace(new RegExp(sq,"g"),`<mark>${sq}</mark>`)}}/>
                        </div>
                      ))
                  }
                </div>
              )}

              {/* Book text */}
              <div style={{background:"var(--bg2)",border:"1px solid var(--bd)",borderRadius:12,
                padding:18,fontFamily:"'Amiri',serif",fontSize:17,lineHeight:2.1,
                color:"var(--t)",marginBottom:13,direction:"rtl",minHeight:130}}>
                <div style={{color:"var(--t3)",fontSize:11,marginBottom:9,fontFamily:"'Tajawal',sans-serif"}}>
                  الفصل {ch+1}: {book.chapters[ch]}
                </div>
                {book.excerpt.split(" ").map((word,i)=>{
                  const clean=word.replace(/[،.!؟:]/g,"");
                  const def=DICT[clean];
                  const isHi=ttsOn&&hiIdx===i;
                  return def?(
                    <span key={i} style={{position:"relative",display:"inline"}}
                      onMouseEnter={()=>setHovW(clean)} onMouseLeave={()=>setHovW(null)}>
                      <span className={`wh ttsw${isHi?" hi":""}`}>{word} </span>
                      {hovW===clean&&(
                        <span className="wtt">
                          <div style={{color:"var(--gold)",fontFamily:"'Amiri',serif",fontSize:15,marginBottom:3}}>{clean}</div>
                          {def}
                        </span>
                      )}
                    </span>
                  ):(
                    <span key={i} className={`ttsw${isHi?" hi":""}`}>{word} </span>
                  );
                })}
              </div>

              {/* Bookmark */}
              <button onClick={()=>{setBkm(true);setTimeout(()=>setBkm(false),2200);showT("✓ إشارة مرجعية محفوظة");}}
                style={{display:"flex",alignItems:"center",gap:6,padding:"6px 13px",
                  background:bkm?"rgba(46,168,110,.16)":"var(--bg3)",
                  border:`1px solid ${bkm?"var(--a)":"var(--bd)"}`,borderRadius:8,
                  color:bkm?"var(--a3)":"var(--t2)",cursor:"pointer",fontSize:13,
                  fontFamily:"'Tajawal',sans-serif",transition:"all .2s"}}>
                <Ic n={bkm?"check":"bkmk"} s={13}/>
                {bkm?"محفوظة!":"إشارة مرجعية"}
              </button>
            </div>
          )}

          {/* STATS */}
          {view==="stats"&&(
            <div className="fi">
              <div className="sh"><span className="st">إحصائياتي</span></div>
              <div className="sgrid">
                {[["14.2","ساعات الاستماع","var(--a3)"],["4","كتب مكتملة","#a78bfa"],
                  ["1.8×","متوسط السرعة","var(--gold)"],["92%","نسبة الإكمال","#f87171"]]
                  .map(([v,l,c])=><div key={l} className="sbox"><div className="sv" style={{color:c}}>{v}</div><div className="sl">{l}</div></div>)}
              </div>
              <div style={{background:"var(--bg2)",border:"1px solid var(--bd)",borderRadius:12,padding:14,marginBottom:14}}>
                <div className="st" style={{marginBottom:10}}>نشاط الأسبوع</div>
                <div className="barch">
                  {["س","أح","إث","ث","أر","خ","ج"].map((d,i)=>{
                    const h=[20,55,40,80,60,75,35][i];
                    return <div key={d} className="barcol"><div className={`barf${i===3?" today":""}`} style={{height:`${h}%`}}/><div className="bard">{d}</div></div>;
                  })}
                </div>
              </div>
              <div style={{background:"var(--bg2)",border:"1px solid var(--bd)",borderRadius:12,padding:13}}>
                <div className="st" style={{marginBottom:10}}>الكتب الأكثر قراءةً</div>
                {books.slice(0,3).map((b,i)=>(
                  <div key={b.id} style={{display:"flex",alignItems:"center",gap:9,padding:"7px 0",borderBottom:i<2?"1px solid var(--bd)":"none"}}>
                    <span style={{fontSize:11,color:"var(--t3)",width:14,textAlign:"center"}}>{i+1}</span>
                    <span style={{fontSize:17}}>{b.icon}</span>
                    <div style={{flex:1}}><div style={{fontSize:13,fontWeight:700}}>{b.title}</div><div style={{fontSize:11,color:"var(--t3)"}}>{b.progress}% مكتمل</div></div>
                    <Ic n="star" s={12}/>
                  </div>
                ))}
              </div>
            </div>
          )}
        </main>

        {/* ── AI PANEL ── */}
        <aside className="aip">
          <div className="aihead">
            <div className="dot"/>
            المساعد الذكي
            {!hasKey&&<button onClick={()=>setShowKey(true)} style={{marginRight:"auto",fontSize:10,
              padding:"2px 8px",background:"rgba(212,168,67,.1)",border:"1px solid var(--gold)",
              borderRadius:5,color:"var(--gold)",cursor:"pointer",fontFamily:"'Tajawal',sans-serif"}}>
              أدخل API Key ↗
            </button>}
          </div>

          <div className="aitabs">
            {[{id:"summary",l:"ملخص",i:"brain"},{id:"chapters",l:"فصول",i:"list"},
              {id:"voices",l:"أصوات",i:"mic"},{id:"ocr",l:"مسح OCR",i:"scan"},
              {id:"dict",l:"قاموس",i:"dict"},{id:"chat",l:"محادثة",i:"chat"}]
              .map(t=><button key={t.id} className={`aitab${aiTab===t.id?" on":""}`} onClick={()=>setAiTab(t.id)}>
                <Ic n={t.i} s={11}/>{t.l}
              </button>)}
          </div>

          <div className="aibody" ref={aiRef}>

            {/* SUMMARY */}
            {aiTab==="summary"&&book&&<>
              <div className="aim"><strong>{book.title}</strong><br/>{book.summary}</div>
              <div className="aim"><strong>الفصل ({ch+1}):</strong> {book.chapters[ch]}<br/><span style={{color:"var(--t3)",fontSize:12}}>تقدمك: {book.progress}%</span></div>
            </>}

            {/* CHAPTERS */}
            {aiTab==="chapters"&&book&&(
              <div style={{display:"flex",flexDirection:"column",gap:2}}>
                {book.chapters.map((c,i)=>(
                  <div key={i} className={`sbi${ch===i?" on":""}`} onClick={()=>setCh(i)}>
                    <span style={{fontSize:11,color:"var(--t3)",minWidth:18}}>{i+1}</span>{c}
                    {ch===i&&<span style={{marginRight:"auto",fontSize:10,color:"var(--a3)"}}>▶</span>}
                  </div>
                ))}
              </div>
            )}

            {/* VOICES */}
            {aiTab==="voices"&&<>
              <div className="aim">اختر الصوت العربي المناسب للاستماع. اضغط "تجربة" للمعاينة.</div>
              {VOICES.map(cfg=>(
                <div key={cfg.id} className={`vc${voice.id===cfg.id?" on":""}`} onClick={()=>setVoice(cfg)}>
                  <div className="vavatar" style={{background:cfg.gender==="f"?"rgba(124,58,237,.2)":"rgba(46,168,110,.2)"}}>
                    {cfg.gender==="f"?"👩":"👨"}
                  </div>
                  <div><div className="vname">{cfg.label}</div><div className="vsub">{cfg.dialect} · {cfg.lang}</div></div>
                  <button className={`vtbtn${testV===cfg.id?" on":""}`} onClick={e=>{e.stopPropagation();testVoice(cfg);}}>
                    {testV===cfg.id?"■ إيقاف":"▶ تجربة"}
                  </button>
                </div>
              ))}
              <div className="aim" style={{fontSize:12,color:"var(--t3)"}}>
                الصوت الحالي: <strong style={{color:"var(--a3)"}}>{voice.label} — {voice.dialect}</strong><br/>
                جودة الصوت تعتمد على أصوات نظام التشغيل المثبتة.
              </div>
            </>}

            {/* OCR */}
            {aiTab==="ocr"&&<>
              <div className="aim">📷 <strong>المسح الضوئي للكتب الورقية</strong><br/>
                ارفع صورة من كتاب ورقي وسيستخرج الذكاء الاصطناعي النص العربي تلقائياً.</div>
              {ocrUrl&&<img src={ocrUrl} className="oimg" alt="preview"/>}
              <div className={`odrop`} ref={dropRef}
                onClick={()=>ocrRef.current?.click()}
                onDragOver={e=>{e.preventDefault();dropRef.current?.classList.add("drag");}}
                onDragLeave={()=>dropRef.current?.classList.remove("drag")}
                onDrop={e=>{e.preventDefault();dropRef.current?.classList.remove("drag");loadOCRFile(e.dataTransfer.files[0]);}}>
                <input ref={ocrRef} type="file" accept="image/*" style={{display:"none"}} onChange={e=>loadOCRFile(e.target.files[0])}/>
                <div style={{fontSize:24,marginBottom:6,color:"var(--t3)"}}><Ic n="camera" s={24}/></div>
                <div style={{fontSize:13,color:"var(--t2)",fontWeight:500}}>{ocrImg?"استبدل الصورة":"ارفع صورة الكتاب"}</div>
                <div style={{fontSize:11,color:"var(--t3)",marginTop:3}}>JPG · PNG · WebP — اسحب وأفلت</div>
              </div>
              {ocrImg&&(
                <button className="msub" disabled={ocrLoad} onClick={runOCR}
                  style={{display:"flex",alignItems:"center",justifyContent:"center",gap:8}}>
                  {ocrLoad?<><span className="sp"/>&nbsp;جارٍ الاستخراج...</>:"🔍 استخرج النص"}
                </button>
              )}
              {ocrRes&&<>
                <div className="ores">{ocrRes}</div>
                <button className="msub" onClick={addOCRBook} style={{background:"var(--purple)"}}>
                  ＋ أضف إلى المكتبة
                </button>
              </>}
            </>}

            {/* DICT */}
            {aiTab==="dict"&&<>
              <input className="mi" placeholder="ابحث عن كلمة..." value={dsq} onChange={e=>setDsq(e.target.value)} style={{marginBottom:4}}/>
              {Object.entries(DICT).filter(([w])=>dsq===""||w.includes(dsq)).map(([word,def])=>(
                <div key={word} className="de">
                  <div><div className="dw">{word}</div><div className="dd">{def}</div></div>
                </div>
              ))}
            </>}

            {/* CHAT */}
            {aiTab==="chat"&&<>
              {msgs.length===0&&<div className="aim">
                مرحباً! اسألني عن <strong>{book?.title||"كتابك"}</strong>.
                {!hasKey&&<><br/><span style={{color:"var(--gold)",fontSize:11}}>⚠ أدخل API Key أولاً</span></>}
              </div>}
              {msgs.map((m,i)=>(
                <div key={i} className={`aim${m.r==="bot"?" bot":""}`}>
                  {m.r==="user"&&<span style={{color:"var(--t3)",fontSize:11}}>أنت: </span>}
                  {m.t||<span className="sp"/>}
                </div>
              ))}
            </>}

          </div>

          {/* Quick AI */}
          <div className="aiqrow">
            <button className="aiq" onClick={()=>qAI(`لخّص الفصل الحالي من "${book?.title}" في 3 نقاط`)}>📝 ملخص الفصل</button>
            <button className="aiq" onClick={()=>qAI(`ما الأفكار الرئيسية في "${book?.title}"؟`)}>💡 أفكار</button>
            <button className="aiq" onClick={()=>qAI(`اقترح كتباً مشابهة لـ "${book?.title}"`)}>📚 مشابهة</button>
            <button className="aiq" onClick={()=>qAI(`اشرح أهم مصطلحات "${book?.title}"`)}>🔤 مصطلحات</button>
          </div>

          {aiTab==="chat"&&(
            <div className="aiinrow">
              <input placeholder="اسأل عن الكتاب..." value={aiIn} onChange={e=>setAiIn(e.target.value)}
                disabled={aiLoad} onKeyDown={e=>{if(e.key==="Enter"&&aiIn.trim()){runAI(aiIn);setAiIn("");}}}/>
              <button className="aisend" disabled={!aiIn.trim()||aiLoad}
                onClick={()=>{runAI(aiIn);setAiIn("");}}>←</button>
            </div>
          )}
        </aside>

        {/* ── PLAYER BAR ── */}
        <footer className="player">
          <div className="pbk">
            <div className="pcover" style={{background:(book?.color||"#1a6b4a")+"33"}}>{book?.icon||"📗"}</div>
            <div>
              <div className="ptitle">{book?.title||"—"}</div>
              <div className="pch">{book?`الفصل ${ch+1}: ${book.chapters[ch]}`:"—"}</div>
            </div>
          </div>

          <div className="pctrls">
            <button className="ctrl" onClick={()=>setCh(c=>Math.max(0,c-1))}><Ic n="prev" s={13}/></button>
            <button className="ctrl" onClick={()=>setProg(p=>Math.max(0,p-3))}><Ic n="rwd" s={14}/></button>
            <button className={`pp${ttsOn?" spk":""}`} onClick={()=>{ if(ttsOn) stopTTS(); else { setView("reader"); doTTS(); } }}>
              <Ic n={ttsOn?"pause":"play"} s={15}/>
            </button>
            <button className="ctrl" onClick={()=>setProg(p=>Math.min(100,p+3))}><Ic n="fwd" s={14}/></button>
            <button className="ctrl" onClick={()=>setCh(c=>Math.min((book?.chapters.length||1)-1,c+1))}><Ic n="next" s={13}/></button>
          </div>

          <div className="pright">
            <span className="tlbl">{fmtT(prog)}</span>
            <div className="ptrack" onClick={e=>{const r=e.currentTarget.getBoundingClientRect();setProg(Math.max(0,Math.min(100,((e.clientX-r.left)/r.width)*100)));}}>
              <div className="pfill" style={{width:`${prog}%`}}/>
            </div>
            <span className="tlbl">42:10</span>
          </div>

          <div className="spdg">
            <button className="spdb" onClick={()=>{setSpeed(s=>Math.max(0.5,Math.round((s-.25)*4)/4));if(ttsOn)stopTTS();}}>−</button>
            <span className="spdv">{speed.toFixed(2).replace(/\.?0+$/,"")}×</span>
            <button className="spdb" onClick={()=>{setSpeed(s=>Math.min(4,Math.round((s+.25)*4)/4));if(ttsOn)stopTTS();}}>+</button>
          </div>

          <div className="vind" onClick={()=>{setAiTab("voices");setView("reader");}}>
            <Ic n="mic" s={12}/>
            <span style={{fontSize:11,color:"var(--t2)"}}>{voice.label}</span>
          </div>
        </footer>

        {/* ── ADD BOOK MODAL ── */}
        {showAdd&&(
          <div className="mbg" onClick={e=>e.target===e.currentTarget&&setShowAdd(false)}>
            <div className="modal fi">
              <div className="mhead">
                <span className="mtitle">إضافة كتاب جديد</span>
                <button className="mcls" onClick={()=>setShowAdd(false)}><Ic n="x" s={15}/></button>
              </div>
              <div className="srctabs">
                {[{id:"pdf",l:"PDF / ملف",i:"upload"},{id:"url",l:"رابط ويب",i:"link"},
                  {id:"text",l:"لصق نص",i:"text"},{id:"ocr",l:"مسح ورقي",i:"camera"}]
                  .map(t=><button key={t.id} className={`srctab${addTab===t.id?" on":""}`} onClick={()=>setAddTab(t.id)}>
                    <Ic n={t.i} s={15}/>{t.l}
                  </button>)}
              </div>
              <div className="mbody">
                {addTab==="pdf"&&<div className="dzone">
                  <div style={{fontSize:24,color:"var(--t3)",marginBottom:7}}><Ic n="upload" s={24}/></div>
                  <div style={{fontSize:13,color:"var(--t2)",fontWeight:500}}>اسحب ملفك هنا أو انقر للاختيار</div>
                  <div style={{fontSize:11,color:"var(--t3)",marginTop:3}}>PDF · EPUB · DOCX · TXT</div>
                </div>}
                {addTab==="url"&&<>
                  <input className="mi" placeholder="الصق رابط الكتاب أو المقال..." value={urlIn} onChange={e=>setUrlIn(e.target.value)}/>
                  <div style={{fontSize:11,color:"var(--t3)"}}>مثال: https://shamela.ws/book/123</div>
                </>}
                {addTab==="text"&&<textarea className="mi" rows={6} placeholder="الصق النص العربي هنا..." value={txtIn} onChange={e=>setTxtIn(e.target.value)}/>}
                {addTab==="ocr"&&<div style={{textAlign:"center",padding:"8px 0"}}>
                  <div style={{fontSize:28,marginBottom:9}}>📷</div>
                  <div style={{fontSize:13,color:"var(--t2)",marginBottom:12}}>ارفع صورة كتاب ورقي — الذكاء الاصطناعي يستخرج النص تلقائياً</div>
                  <button className="msub" style={{background:"var(--purple)"}} onClick={()=>{setShowAdd(false);setAiTab("ocr");setView("reader");}}>انتقل إلى المسح الضوئي</button>
                </div>}
                {addTab!=="ocr"&&(
                  <button className="msub" onClick={()=>{
                    const nb={id:books.length+1,
                      title:addTab==="url"?(urlIn||"كتاب من الويب"):addTab==="text"?"نص مُلصق":"كتاب مرفوع",
                      author:"—",type:"متنوع",progress:0,color:"#2a3a2a",
                      icon:addTab==="url"?"🌐":addTab==="text"?"📝":"📄",
                      chapters:["الفصل الأول"],summary:"جارٍ معالجة الكتاب...",
                      excerpt:txtIn||urlIn||"محتوى الكتاب"};
                    setBooks(b=>[...b,nb]);setShowAdd(false);setUrlIn("");setTxtIn("");
                    showT("✓ أُضيف الكتاب إلى مكتبتك");
                  }}>إضافة إلى المكتبة</button>
                )}
              </div>
            </div>
          </div>
        )}

        {/* ── API KEY MODAL ── */}
        {showKey&&(
          <div className="mbg" onClick={e=>e.target===e.currentTarget&&setShowKey(false)}>
            <div className="kmodal fi">
              <div className="mhead">
                <span className="mtitle" style={{display:"flex",alignItems:"center",gap:8}}>
                  <Ic n="key" s={15}/> مفتاح Anthropic API
                </span>
                <button className="mcls" onClick={()=>setShowKey(false)}><Ic n="x" s={15}/></button>
              </div>
              <div className="mbody">
                <div className="kinfo">
                  يُستخدم للمساعد الذكي وميزة OCR. يبقى في ذاكرة المتصفح فقط ولا يُخزَّن.<br/>
                  احصل على مفتاحك من: <span style={{color:"var(--a3)"}}>console.anthropic.com</span>
                </div>
                <div className="krow">
                  <input className="mi" type="password" placeholder="sk-ant-api03-..."
                    value={keyIn} onChange={e=>setKeyIn(e.target.value)}
                    onKeyDown={e=>e.key==="Enter"&&saveKey()}
                    style={{fontFamily:"monospace",fontSize:12}}/>
                  <button className="ksave" onClick={saveKey}>حفظ</button>
                </div>
                {hasKey&&(
                  <div style={{padding:"8px 11px",background:"rgba(46,168,110,.09)",border:"1px solid var(--a)",
                    borderRadius:8,fontSize:12,color:"var(--a3)",display:"flex",alignItems:"center",gap:6}}>
                    <Ic n="check" s={13}/> مفتاح API نشط
                    <button onClick={()=>{setKey("");setHasKey(false);setKeyIn("");setShowKey(false);showT("تم حذف المفتاح");}}
                      style={{marginRight:"auto",fontSize:11,background:"none",border:"none",color:"var(--red)",cursor:"pointer"}}>حذف</button>
                  </div>
                )}
              </div>
            </div>
          </div>
        )}

      </div>
    </>
  );
}

// ── BookCard component ────────────────────────────────────────────────────────
function Bcard({b, sel, onClick}) {
  return (
    <div className={`bc${sel?" sel":""}`} onClick={onClick}>
      <div className="bcover" style={{background:(b.color||"#1a6b4a")+"44"}}>
        {b.icon}
        <div className="bpct">{b.progress}%</div>
        <div className="bbar"><div className="bfill" style={{width:`${b.progress}%`}}/></div>
      </div>
      <div className="bbody">
        <div className="btitle">{b.title}</div>
        <div className="bauthor">{b.author}</div>
        <div className="btag">{b.type}</div>
      </div>
    </div>
  );
}

  const root = ReactDOM.createRoot(document.getElementById('root'));
  root.render(<App/>);
  </script>
</body>
